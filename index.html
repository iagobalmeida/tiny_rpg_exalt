<!DOCTYPE html>
<html>
<head>
<title>tiny_rpg_exalt</title>
<link rel="stylesheet" href="/style.css">
</head>
<body style="overflow:hidden">
<script src="src/main.js" type="module"></script>
<div class="info-wrapper">
    <div class="info">
        <label for="region">
            Region
            <select id="region">
                <option value="beach">Beach</option>
                <option value="mid_plains">Mid Plains</option>
            </select>
        </label>
        <button id="explore">Explore</button>
        <label for="auto-explore">
            Auto
            <input type="checkbox" id="auto-explore" />
        </label>
    </div>
    <div class="info">
        <label>
            Attributes
            <ul>
                <li>
                    <span id="attribute-level">1</span>
                    <small>LVL</small>
                </li>
                <li style="grid-column-start: 2;grid-column-end: 4;">
                    <span id="attribute-exp">0/0</span>
                    <small>EXP</small>
                </li>
            </ul>
            <ul>
                <li>
                    <span id="attribute-att">10<small>+1</small></span>
                    <small>ATT</small>
                </li>
                <li>
                    <span id="attribute-dex">10<small>+1</small></span>
                    <small>DEX</small>
                </li>
                <li>
                    <span id="attribute-def">10<small>+1</small></span>
                    <small>DEF</small>
                </li>
            </ul>
        </label>
    </div>
    <div class="info">
        <label>
            Inventory (4/10)
            <ul class="inventory">
                <li class="active">
                    <div class="item-image">
                        <img src="./sprites/items/short_sword.png" alt="short_sword">
                    </div>
                    <div class="item-description">
                        <p>Short Sword</p>
                        <div class="item-attributes">
                            <small>+1 ATT</small>
                        </div>
                    </div>
                </li>
                <li>
                    <div class="item-image">
                        <img src="./sprites/items/iron_mail.png" alt="iron_mail">
                    </div>
                    <div class="item-description">
                        <p>Iron Mail</p>
                        <div class="item-attributes">
                            <small>+1 DEF</small>
                        </div>
                    </div>
                </li>
                <li>
                    <div class="item-image">
                        <img src="./sprites/items/shield.png" alt="shield">
                    </div>
                    <div class="item-description">
                        <p>Shield</p>
                        <div class="item-attributes">
                            <small>+1 DEF</small>
                        </div>
                    </div>
                </li>
                <li>
                    <div class="item-image">
                        <img src="./sprites/items/thistleleaf_necklace.png" alt="thistleleaf_necklace">
                    </div>
                    <div class="item-description">
                        <p>Thistleleaf Necklace</p>
                        <div class="item-attributes">
                            <small>+1 DEX</small>
                        </div>
                    </div>
                </li>
                <li class="empty">
                    <div class="item-image">
                        <img src="./sprites/items/empty.png" alt="empty">
                    </div>
                    <div class="item-description">
                        <p>-</p>
                    </div>
                </li>
                <li class="empty">
                    <div class="item-image">
                        <img src="./sprites/items/empty.png" alt="empty">
                    </div>
                    <div class="item-description">
                        <p>-</p>
                    </div>
                </li>
                <li class="empty">
                    <div class="item-image">
                        <img src="./sprites/items/empty.png" alt="empty">
                    </div>
                    <div class="item-description">
                        <p>-</p>
                    </div>
                </li>
                <li class="empty">
                    <div class="item-image">
                        <img src="./sprites/items/empty.png" alt="empty">
                    </div>
                    <div class="item-description">
                        <p>-</p>
                    </div>
                </li>
                <li class="empty">
                    <div class="item-image">
                        <img src="./sprites/items/empty.png" alt="empty">
                    </div>
                    <div class="item-description">
                        <p>-</p>
                    </div>
                </li>
                <li class="empty">
                    <div class="item-image">
                        <img src="./sprites/items/empty.png" alt="empty">
                    </div>
                    <div class="item-description">
                        <p>-</p>
                    </div>
                </li>
                <li class="empty">
                    <div class="item-image">
                        <img src="./sprites/items/empty.png" alt="empty">
                    </div>
                    <div class="item-description">
                        <p>-</p>
                    </div>
                </li>
                <li class="empty">
                    <div class="item-image">
                        <img src="./sprites/items/empty.png" alt="empty">
                    </div>
                    <div class="item-description">
                        <p>-</p>
                    </div>
                </li>
                <li class="empty">
                    <div class="item-image">
                        <img src="./sprites/items/empty.png" alt="empty">
                    </div>
                    <div class="item-description">
                        <p>-</p>
                    </div>
                </li>
            </ul>
        </label>
    </div>
    <div class="info">
        <label for="region">
            Options
            <button class="danger" id="restart-progress">Restart Progress</button>
        </label>
    </div>
</div>
</body>
</html>
