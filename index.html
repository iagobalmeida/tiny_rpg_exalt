<!DOCTYPE html>
<html>
<head>
<title>tiny_rpg_exalt</title>
<link rel="stylesheet" href="/style.css">
</head>
<body style="overflow:hidden">
<script src="src/main.js" type="module"></script>
<div class="info-wrapper">
    <div class="info">
        <label for="region">
            Region
            <select>
                <option value="beach" id="region">Beach</option>
            </select>
        </label>
        <button id="explore">Explore</button>
    </div>
    <hr>
    <div class="info">
        <label for="gold">
            Gold
            <input type="number" value="10" id="gold" readonly>
        </label>
    </div>
    <div class="info">
        <label>
            Attributes
            <ul class="attributes-wrapper">
                <li class="attribute">
                    <span id="attribute-level">1</span>
                    <small>LVL</small>
                </li>
                <li class="attribute">
                    <span id="attribute-exp">0</span>
                    <small>EXP</small>
                </li>
                <li class="attribute">
                    <span id="attribute-att">10</span>
                    <small>ATT</small>
                </li>
                <li class="attribute">
                    <span id="attribute-dex">10</span>
                    <small>DEX</small>
                </li>
            </ul>
        </label>
    </div>
</div>
</body>
</html>
